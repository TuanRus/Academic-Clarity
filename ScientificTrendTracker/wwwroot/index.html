<!DOCTYPE html>
<!--
   DEMO / REFERENCE cho FE — KHÔNG phải FE chính thức.
  File này minh họa cách gọi API mind map của backend (đọc để hiểu luồng + tham số):
    1. GET tree/keyword?keyword=&maxBranches=&maxSubBranches=
          → cây 3 TẦNG KEYWORD (chủ đề → con → cháu), KHÔNG có bài trên cây.
    2. Click 1 node keyword → GET papers/keyword?keyword=&distinctFrom=<keyword gốc>
          → danh sách bài của node đó. distinctFrom giúp sub-node hiện bài ĐẶC TRƯNG,
            tránh lặp lại "megahit" (bài citation cao) của chủ đề gốc.
    3. GET search?q=  /  search/author?author=  /  search/journal?journal=
          → list bài → click 1 bài → GET graph/paper/{paperId} → mind map quanh bài đó.
  TREND DASHBOARD (view thứ 2, nút chuyển ở góc phải header):
    4. GET trend/top?dimension=keyword|author|journal&fromYear=&toYear=&topN=
          → bảng xếp hạng top entity theo share.
    5. GET trend/series?dimension=&value=&fromYear=&toYear=&groupBy=year|month
          → time-series share theo kỳ + slope + direction (line chart Chart.js).
  FE thật xây riêng; tham khảo thứ tự gọi + tham số ở đây. Render: vis-network (map) + Chart.js (trend).
-->
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scientific Trend Tracker — Research Mind Map</title>
  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e6e6e6; }
    header { padding: 12px 20px; background: #161a23; border-bottom: 1px solid #2a2f3a; }
    header h1 { margin: 0; font-size: 17px; }
    header p { margin: 3px 0 0; font-size: 12px; color: #8a93a3; }
    .toolbar { display: flex; gap: 8px; align-items: center; padding: 10px 20px; background: #12151c; flex-wrap: wrap; }
    .toolbar select, .toolbar input[type=text], .toolbar input[type=number], .toolbar button {
      padding: 8px 12px; border-radius: 6px; border: 1px solid #2a2f3a; background: #1c2230; color: #e6e6e6; font-size: 14px;
    }
    .toolbar input[type=text] { width: 240px; }
    .toolbar input[type=number] { width: 88px; }
    .toolbar label { font-size: 13px; color: #b6bdca; display: flex; align-items: center; gap: 5px; }
    .toolbar button { background: #2563eb; border-color: #2563eb; cursor: pointer; font-weight: 600; }
    .toolbar button:hover { background: #1d4ed8; }
    .toolbar button.ghost { background: #1c2230; border-color: #2a2f3a; }
    #status { font-size: 13px; color: #8a93a3; margin-left: auto; }
    #network { width: 100%; height: calc(100vh - 175px); background: #0f1117; }
    .legend { display: flex; gap: 16px; padding: 7px 20px; font-size: 12px; color: #8a93a3; background: #12151c; border-top: 1px solid #2a2f3a; }
    .dot { display: inline-block; width: 11px; height: 11px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
    #paperList { position: absolute; top: 125px; left: 20px; width: 360px; max-height: 62vh; overflow-y: auto;
      background: #161a23; border: 1px solid #2a2f3a; border-radius: 8px; display: none; z-index: 10; }
    #paperList .item { padding: 10px 12px; border-bottom: 1px solid #2a2f3a; cursor: pointer; font-size: 13px; }
    #paperList .item:hover { background: #1c2230; }
    #paperList .meta { color: #8a93a3; font-size: 11px; margin-top: 3px; }
    /* View switcher + Trend dashboard */
    .header-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .switcher { display: flex; gap: 6px; }
    .viewbtn { padding: 7px 14px; border-radius: 6px; border: 1px solid #2a2f3a; background: #1c2230; color: #b6bdca; cursor: pointer; font-size: 13px; font-weight: 600; }
    .viewbtn.active { background: #2563eb; border-color: #2563eb; color: #fff; }
    #trendBody { display: flex; gap: 14px; padding: 14px 20px; height: calc(100vh - 175px); }
    #trendTop { width: 340px; overflow-y: auto; background: #161a23; border: 1px solid #2a2f3a; border-radius: 8px; flex-shrink: 0; }
    #trendTop .item { padding: 9px 12px; border-bottom: 1px solid #2a2f3a; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; gap: 8px; }
    #trendTop .item:hover { background: #1c2230; }
    #trendTop .item.head { font-weight: 600; color: #0ea5e9; cursor: default; }
    #trendTop .bar { color: #8a93a3; font-size: 11px; white-space: nowrap; }
    #trendChartWrap { flex: 1; background: #161a23; border: 1px solid #2a2f3a; border-radius: 8px; padding: 14px; position: relative; }
  </style>
</head>
<body>
  <header>
    <div class="header-row">
      <div>
        <h1>Scientific Trend Tracker</h1>
        <p>Demo — dữ liệu OpenAlex (CS 2022+), keyword bởi AI, Q-rank bởi SCImago</p>
      </div>
      <div class="switcher">
        <button class="viewbtn active" id="btnMindmap">Mind Map</button>
        <button class="viewbtn" id="btnTrend">Trend Dashboard</button>
      </div>
    </div>
  </header>

  <!-- ===== VIEW 1: MIND MAP ===== -->
  <div id="mindmapView">
  <div class="toolbar">
    <select id="mode">
      <option value="tree">Mind Map cây (chủ đề → con → cháu, click xem bài)</option>
      <option value="paper">Theo bài báo (tìm → chọn)</option>
    </select>
    <input type="text" id="q" list="kwSuggest" autocomplete="off" placeholder="Gõ keyword có trong DB..." />
    <datalist id="kwSuggest"></datalist>
    <label>Nhánh: <input type="number" id="branches" value="6" min="1" max="15" /></label>
    <label>Cháu/nhánh: <input type="number" id="perBranch" value="3" min="0" max="10" /></label>
    <button id="go">Tạo Mind Map</button>
    <button id="png" class="ghost">Lưu ảnh</button>
    <span id="status"></span>
  </div>

  <div id="paperList"></div>
  <div id="network"></div>

  <div class="legend">
    <span><span class="dot" style="background:#0ea5e9"></span>Chủ đề trung tâm</span>
    <span><span class="dot" style="background:#10b981"></span>Chủ đề con (đậm = đang hot)</span>
    <span>Click node chủ đề → xổ danh sách bài bên trái</span>
    <span>Hover xem chi tiết</span>
  </div>
  </div><!-- /mindmapView -->

  <!-- ===== VIEW 2: TREND DASHBOARD ===== -->
  <div id="trendView" style="display:none">
    <div class="toolbar">
      <select id="tDim">
        <option value="keyword">Keyword</option>
        <option value="author">Author</option>
        <option value="journal">Journal</option>
      </select>
      <input type="text" id="tValue" placeholder="Tên entity (vd: large-language-models) — để trống = top ranking" />
      <label>Từ năm: <input type="number" id="tFrom" value="2022" min="2000" max="2026" /></label>
      <label>Đến năm: <input type="number" id="tTo" value="2026" min="2000" max="2026" /></label>
      <select id="tGroup">
        <option value="year">Theo năm</option>
        <option value="month">Theo tháng</option>
      </select>
      <select id="tSort">
        <option value="share">Sắp xếp: nhiều bài nhất</option>
        <option value="rising">Sắp xếp: đang lên</option>
        <option value="falling">Sắp xếp: đang xuống</option>
      </select>
      <button id="tGo">Xem Trend</button>
      <span id="tStatus"></span>
    </div>
    <div id="trendBody">
      <div id="trendTop"></div>
      <div id="trendChartWrap"><canvas id="trendChart"></canvas></div>
    </div>
  </div>

<script>
const elQ = document.getElementById('q');
const elMode = document.getElementById('mode');
const elBranches = document.getElementById('branches');
const elPer = document.getElementById('perBranch');
const elStatus = document.getElementById('status');
const elPaperList = document.getElementById('paperList');
let network = null;
let currentRoot = ''; // keyword gốc đang xem — để click sub-node truyền distinctFrom (chống megahit)

document.getElementById('go').onclick = run;
document.getElementById('png').onclick = savePng;
elQ.addEventListener('keydown', e => { if (e.key === 'Enter') run(); });

// Autocomplete: chỉ gợi ý keyword CÓ SẴN trong DB (debounce 180ms khi gõ ≥ 2 ký tự)
const elKwSuggest = document.getElementById('kwSuggest');
let suggestTimer = null;
elQ.addEventListener('input', () => {
  clearTimeout(suggestTimer);
  const q = elQ.value.trim();
  if (q.length < 2) { elKwSuggest.innerHTML = ''; return; }
  suggestTimer = setTimeout(async () => {
    try {
      const res = await fetch(`/api/mindmap/keywords/suggest?q=${encodeURIComponent(q)}&limit=10`);
      const json = await res.json();
      elKwSuggest.innerHTML = (json?.data || []).map(k => `<option value="${k.replace(/"/g, '&quot;')}"></option>`).join('');
    } catch {}
  }, 180);
});

function run() {
  const q = elQ.value.trim();
  if (!q) { elStatus.textContent = 'Nhập từ khóa đã.'; return; }
  elPaperList.style.display = 'none';
  if (elMode.value === 'tree') drawTree(q);
  else showPaperList(q);
}

async function drawTree(keyword) {
  elStatus.textContent = 'Đang dựng cây...';
  currentRoot = keyword.trim().toLowerCase();
  const b = elBranches.value || 6, p = elPer.value || 3;
  const res = await fetch(`/api/mindmap/tree/keyword?keyword=${encodeURIComponent(keyword)}&maxBranches=${b}&maxSubBranches=${p}`);
  const json = await res.json();
  if (!json.success || !json.data || json.data.totalNodes === 0) { elStatus.textContent = `Không tìm thấy "${keyword}".`; return; }
  // CHỈ giữ node keyword (chủ đề → chủ đề con). Bài báo KHÔNG hiện trên cây — click node mới xổ danh sách bài.
  const kwIds = new Set(json.data.nodes.filter(n => n.type === 'keyword').map(n => n.id));
  json.data.nodes = json.data.nodes.filter(n => n.type === 'keyword');
  json.data.edges = json.data.edges.filter(e => kwIds.has(e.source) && kwIds.has(e.target));
  elPaperList.style.display = 'none';
  renderGraph(json.data, true);
  elStatus.textContent = `${json.data.nodes.length} chủ đề · 👆 click 1 node để xem bài`;
}

async function showPaperList(query) {
  elStatus.textContent = 'Đang tìm bài báo...';
  const res = await fetch(`/api/mindmap/search?q=${encodeURIComponent(query)}&page=1&pageSize=20`);
  const json = await res.json();
  const items = json?.data?.items || [];
  if (!items.length) { elStatus.textContent = 'Không có bài khớp.'; return; }
  elStatus.textContent = `${json.data.totalCount} bài — chọn 1 bài`;
  elPaperList.innerHTML = '';
  items.forEach(p => {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<div>${p.title}</div><div class="meta">${p.year ?? '?'} · ${p.citationCount} cit · ${p.keywordCount} kw${p.quartile ? ' · ' + p.quartile : ''}</div>`;
    div.onclick = () => drawPaperGraph(p.paperId);
    elPaperList.appendChild(div);
  });
  elPaperList.style.display = 'block';
}

async function drawPaperGraph(paperId) {
  elStatus.textContent = 'Đang tải graph...';
  elPaperList.style.display = 'none';
  const res = await fetch(`/api/mindmap/graph/paper/${encodeURIComponent(paperId)}?maxSiblings=5`);
  const json = await res.json();
  if (!json.success || json.data.totalNodes === 0) { elStatus.textContent = 'Không dựng được graph.'; return; }
  renderGraph(json.data, false);
}

function trendColor(score) {
  if (score == null) return '#10b981';
  const g = Math.round(120 + score * 100);
  return `rgb(16, ${g}, ${Math.round(110 + (1-score)*30)})`;
}

function renderGraph(data, isTree) {
  const nodes = data.nodes.map(n => {
    if (n.type === 'keyword') {
      const isCentral = n.level === 0;
      return {
        id: n.id, label: n.label, shape: 'dot',
        level: n.level ?? 0,
        size: isCentral ? 30 : 12 + Math.sqrt(n.paperCount || 1) * 3,
        color: isCentral
          ? { background: '#0ea5e9', border: '#0369a1' }
          : { background: trendColor(n.trendScore), border: '#0d9488' },
        font: { color: '#e6e6e6', size: isCentral ? 18 : 14, bold: isCentral },
        _keyword: n.label, _level: n.level ?? 0,
        title: `${isCentral ? 'CHỦ ĐỀ' : 'CHỦ ĐỀ CON'}: ${n.label}\nSố bài: ${n.paperCount}` + (n.trendScore != null ? `\nTrendScore: ${n.trendScore}` : '') + '\nClick để xem bài'
      };
    }
    const t = n.label || '';
    return {
      id: n.id, label: t.length > 34 ? t.slice(0,34) + '…' : t, shape: 'box',
      level: n.level ?? 2,
      color: { background: '#f59e0b', border: '#b45309' },
      font: { color: '#1a1a1a', size: 12 },
      _url: n.sourceUrl,
      title: `PAPER: ${t}\nNăm: ${n.year}\nCitations: ${n.citationCount}\nQuartile: ${n.quartile || '—'}`
    };
  });
  const edges = data.edges.map(e => ({ from: e.source, to: e.target, color: { color: '#3a4150' }, smooth: { type: 'cubicBezier', forceDirection: 'horizontal' } }));

  const options = isTree ? {
    layout: { hierarchical: { enabled: true, direction: 'LR', sortMethod: 'directed', levelSeparation: 280, nodeSpacing: 90, treeSpacing: 120 } },
    physics: false,
    interaction: { hover: true, tooltipDelay: 100 },
    nodes: { borderWidth: 2 }
  } : {
    layout: { hierarchical: { enabled: false } },
    physics: { stabilization: true, barnesHut: { gravitationalConstant: -8000, springLength: 120 } },
    interaction: { hover: true, tooltipDelay: 100 },
    nodes: { borderWidth: 2 }
  };

  const container = document.getElementById('network');
  const dataset = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
  if (network) network.destroy();
  network = new vis.Network(container, dataset, options);
  network.on('click', params => {
    if (!params.nodes.length) return;
    const node = dataset.nodes.get(params.nodes[0]);
    if (node._url) { window.open(node._url, '_blank'); return; }   // node bài báo → mở bài gốc
    if (node._keyword) showNodePapers(node._keyword, node._level);  // node keyword → xổ danh sách bài
  });
}

// Click 1 node keyword → gọi papers/keyword, hiện danh sách bài ở panel.
// Sub-node (level>0) truyền distinctFrom=root để hiện bài ĐẶC TRƯNG, không lặp megahit của chủ đề gốc.
async function showNodePapers(keyword, level) {
  elPaperList.style.display = 'block';
  elPaperList.innerHTML = `<div class="item">Đang tải bài cho "${keyword}"...</div>`;
  const distinct = (level > 0 && currentRoot && currentRoot !== keyword.toLowerCase())
    ? `&distinctFrom=${encodeURIComponent(currentRoot)}` : '';
  const res = await fetch(`/api/mindmap/papers/keyword?keyword=${encodeURIComponent(keyword)}&limit=10${distinct}`);
  const json = await res.json();
  const items = json?.data || [];
  if (!items.length) { elPaperList.innerHTML = `<div class="item">Không có bài cho "${keyword}".</div>`; return; }
  elPaperList.innerHTML = `<div class="item" style="font-weight:600;color:#0ea5e9">${items.length} bài · ${keyword}</div>`;
  items.forEach(p => {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<div>${p.title}</div><div class="meta">${p.year ?? '?'} · ${p.citationCount} cit${p.quartile ? ' · ' + p.quartile : ''}${p.journalName ? ' · ' + p.journalName : ''}</div>`;
    if (p.sourceUrl) div.onclick = () => window.open(p.sourceUrl, '_blank');
    elPaperList.appendChild(div);
  });
}

function savePng() {
  if (!network) return;
  const canvas = document.querySelector('#network canvas');
  if (!canvas) return;
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'mindmap.png';
  a.click();
}

/* ============ VIEW SWITCHER: Mind Map ↔ Trend Dashboard ============ */
const elMindmapView = document.getElementById('mindmapView');
const elTrendView = document.getElementById('trendView');
const btnMindmap = document.getElementById('btnMindmap');
const btnTrend = document.getElementById('btnTrend');
btnMindmap.onclick = () => switchView('mindmap');
btnTrend.onclick = () => switchView('trend');
function switchView(v) {
  const isTrend = v === 'trend';
  elMindmapView.style.display = isTrend ? 'none' : '';
  elTrendView.style.display = isTrend ? '' : 'none';
  btnTrend.classList.toggle('active', isTrend);
  btnMindmap.classList.toggle('active', !isTrend);
  if (isTrend && !trendChart) loadTrend(); // lần đầu mở dashboard → tự tải
}

/* ============ TREND DASHBOARD ============ */
const tDim = document.getElementById('tDim');
const tValue = document.getElementById('tValue');
const tFrom = document.getElementById('tFrom');
const tTo = document.getElementById('tTo');
const tGroup = document.getElementById('tGroup');
const tSort = document.getElementById('tSort');
const tStatus = document.getElementById('tStatus');
const trendTop = document.getElementById('trendTop');
let trendChart = null;
document.getElementById('tGo').onclick = loadTrend;
tSort.onchange = loadTrend;
tValue.addEventListener('keydown', e => { if (e.key === 'Enter') loadTrend(); });

async function loadTrend() {
  const dim = tDim.value, from = tFrom.value, to = tTo.value, group = tGroup.value, sort = tSort.value;
  tStatus.textContent = 'Đang tải bảng xếp hạng...';
  // 1) Top ranking (luôn tải)
  const topRes = await fetch(`/api/trend/top?dimension=${dim}&fromYear=${from}&toYear=${to}&topN=20&minPapers=2&sortBy=${sort}`);
  const topJson = await topRes.json();
  const items = topJson?.data || [];
  renderTop(items, dim);
  // 2) Time-series: dùng value gõ tay, nếu trống thì lấy top #1
  let val = tValue.value.trim();
  if (!val && items.length) val = items[0].name;
  if (val) await loadSeries(dim, val, from, to, group);
  else { tStatus.textContent = 'Không có dữ liệu.'; clearChart(); }
}

async function loadSeries(dim, val, from, to, group) {
  tStatus.textContent = `Đang tải trend "${val}"...`;
  const res = await fetch(`/api/trend/series?dimension=${dim}&value=${encodeURIComponent(val)}&fromYear=${from}&toYear=${to}&groupBy=${group}`);
  const json = await res.json();
  if (!json.success || !json.data) { tStatus.textContent = `Không có trend cho "${val}".`; clearChart(); return; }
  renderChart(json.data);
  const arrow = json.data.direction === 'rising' ? 'đang lên' : json.data.direction === 'falling' ? 'đang xuống' : 'ổn định';
  tStatus.textContent = `${dim} "${json.data.value}": ${arrow} · ${json.data.series.length} kỳ · tổng ${json.data.totalPapers} bài`;
}

function renderTop(items, dim) {
  trendTop.innerHTML = `<div class="item head"><span>TOP ${dim.toUpperCase()}</span><span>bài · share</span></div>`;
  if (!items.length) { trendTop.innerHTML += '<div class="item">Không có dữ liệu.</div>'; return; }
  items.forEach((it, i) => {
    const div = document.createElement('div');
    div.className = 'item';
    const name = it.name.length > 28 ? it.name.slice(0, 28) + '…' : it.name;
    const mark = it.direction === 'rising' ? '<span style="color:#10b981">▲</span>'
      : it.direction === 'falling' ? '<span style="color:#ef4444">▼</span>'
      : '<span style="color:#6b7280">–</span>';
    div.innerHTML = `<span>${i + 1}. ${name}</span><span class="bar">${mark} ${it.count} · ${(it.share * 100).toFixed(2)}%</span>`;
    div.onclick = () => { tValue.value = it.name; loadSeries(tDim.value, it.name, tFrom.value, tTo.value, tGroup.value); };
    trendTop.appendChild(div);
  });
}

function renderChart(data) {
  const labels = data.series.map(p => p.period);
  const shares = data.series.map(p => +(p.share * 100).toFixed(3));
  const totals = data.series.map(p => p.periodTotal);
  const counts = data.series.map(p => p.count);
  clearChart();
  trendChart = new Chart(document.getElementById('trendChart'), {
    type: 'bar',
    data: { labels, datasets: [{
      label: `Share % — ${data.value}`, data: shares,
      backgroundColor: '#0ea5e9', borderColor: '#0369a1', borderWidth: 1, borderRadius: 3
    }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#e6e6e6' } },
        tooltip: { callbacks: { afterLabel: ctx => `Bài: ${counts[ctx.dataIndex]} / ${totals[ctx.dataIndex]} (tổng kỳ)` } }
      },
      scales: {
        x: { ticks: { color: '#8a93a3' }, grid: { color: '#2a2f3a' } },
        y: { ticks: { color: '#8a93a3' }, grid: { color: '#2a2f3a' }, title: { display: true, text: 'Share (%)', color: '#8a93a3' }, beginAtZero: true }
      }
    }
  });
}

function clearChart() { if (trendChart) { trendChart.destroy(); trendChart = null; } }

elQ.value = 'large-language-model';
run();
</script>
</body>
</html>
